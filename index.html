<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Science Action - Perfect Pause</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
    
    <style>
        :root {
            --orange: #eb5745;
            --bezier: cubic-bezier(0.2, 1, 0.3, 1);
            
            /* ВЕЛИЧИНА ПАУЗЫ (в пикселях скролла). 
               150px — это примерно одно легкое движение пальцем/колесиком */
            --pause: 150px; 
        }

        html { font-size: 14pt; }

        html.lenis, html.lenis body { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto !important; }
        .lenis.lenis-stopped { overflow: hidden; }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body { background-color: #fff; }

        /* --- 1. HERO --- */
        .hero {
            width: 100%;
            height: 100dvh;
            background: #1a1a1a url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2000') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }
        .hero h1 { font-size: 2.8rem; font-weight: 900; line-height: 1.1; margin-bottom: 1rem; }

        /* --- 2. GRID OVERLAP --- */
        .overlap-wrapper {
            display: grid;
            grid-template-columns: 1fr;
        }

        .page-content, .menu-layer {
            grid-column: 1;
            grid-row: 1;
        }

        /* --- 3. БЕЛЫЙ КОНТЕНТ (Снизу) --- */
        .page-content {
            background: white;
            padding: 3rem 1.2rem 120px 1.2rem;
            z-index: 5;
            min-height: 100dvh;
            
            /* СДВИГАЕМ КОНТЕНТ ВНИЗ. 
               Он будет "ждать", пока мы проскроллим эти 150px по оранжевому блоку */
            margin-top: var(--pause); 
        }

        /* --- 4. ОРАНЖЕВОЕ МЕНЮ (Сверху) --- */
        .menu-layer {
            z-index: 10;
            pointer-events: none;
        }

        .menu {
            position: sticky;
            top: 0;
            width: 100%;
            height: 100dvh;
            background-color: var(--orange);
            color: white;
            overflow: hidden;
            pointer-events: auto; 
            
            transition: 
                width 0.25s var(--bezier), 
                height 0.25s var(--bezier), 
                border-radius 0.25s var(--bezier),
                transform 0.25s var(--bezier);
            transform-origin: top left;
        }

        .menu-inner {
            width: 100vw;
            height: 100dvh;
            padding: 2.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: opacity 0.15s ease; 
        }

        /* --- СОСТОЯНИЯ МЕНЮ --- */
        .menu.is-fab {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            transform: translate(20px, calc(100dvh - 94px));
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        
        .menu.is-fab .menu-inner { opacity: 0; pointer-events: none; }

        .menu.is-expanded {
            position: fixed;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100dvh !important;
            transform: translate(0,0) !important;
            border-radius: 0 !important;
            z-index: 2000;
        }

        .fab-icon {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px; opacity: 0;
            background: none; border: none; color: white;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }
        .menu.is-fab .fab-icon { opacity: 1; pointer-events: auto; }

        .menu-title { font-size: 2.4rem; font-weight: 900; line-height: 1.1; margin: 1rem 0; }
        .pill { display: inline-block; padding: 0.6rem 1rem; border-radius: 20px; font-size: 0.8rem; font-weight: 700; background: rgba(0,0,0,0.1); margin-right: 5px; margin-top: 10px;}
        .pill.active { background: white; color: var(--orange); }

        .close-btn {
            width: 56px; height: 56px; border: 2px solid rgba(255,255,255,0.4);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 28px; cursor: pointer; visibility: hidden;
            background: transparent; color: white;
            margin-bottom: env(safe-area-inset-bottom);
        }
        .menu.is-expanded .close-btn { visibility: visible; }

        .card { background: #f5f5f5; padding: 1.5rem; border-radius: 20px; margin-bottom: 1.5rem; border: 1px solid #eee; }
        .label { font-size: 0.65rem; color: #999; font-weight: 800; text-transform: uppercase; margin-bottom: 0.5rem; }
        .value { font-size: 1.4rem; font-weight: 700; }
    </style>
</head>
<body>

    <header class="hero" id="hero">
        <h1>The Future of Science</h1>
        <p>Scroll down to enter</p>
    </header>

    <div class="overlap-wrapper">
        <main class="page-content" id="mainContent">
            <h2 style="font-size: 1.8rem; font-weight: 900; margin-bottom: 1.5rem;">Tell us what you want to</h2>
            <div class="card">
                <div class="label">I want to</div>
                <div class="value">be heard</div>
            </div>
            <div class="card">
                <div class="label">Choose the topic</div>
                <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;">
                    <span style="background: white; padding: 12px 18px; border-radius: 20px; font-size: 0.85rem; border: 1px solid #ddd; font-weight: 600;">data ethics</span>
                    <span style="background: white; padding: 12px 18px; border-radius: 20px; font-size: 0.85rem; border: 1px solid #ddd; font-weight: 600;">climate policy</span>
                </div>
            </div>
            <h2 style="font-size: 1.8rem; font-weight: 900; margin-top: 3rem;">Latest Insights</h2>
            <div style="width:100%; height:250px; background:#f4f4f4; border-radius:25px; margin-top: 15px;"></div>
            <div style="width:100%; height:250px; background:#f4f4f4; border-radius:25px; margin-top: 15px;"></div>
        </main>

        <div class="menu-layer">
            <nav id="menu" class="menu">
                <button class="fab-icon" aria-label="Open menu">☰</button>
                <div class="menu-inner">
                    <div>
                        <div style="font-weight: 700; opacity: 0.8; font-size: 0.75rem;">science action</div>
                        <div class="menu-title">Science for people who give a shit</div>
                        <div style="margin-top: 1rem;">
                            <span class="pill">explore</span>
                            <span class="pill active">action tool</span>
                            <span class="pill">profile</span>
                        </div>
                    </div>
                    <button class="close-btn" id="btnBack" aria-label="Close menu">←</button>
                </div>
            </nav>
        </div>
    </div>

    <script>
        const lenis = new Lenis({
            autoRaf: true,
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            touchMultiplier: 2,
        });

        const menu = document.getElementById('menu');
        const hero = document.getElementById('hero');
        const btnBack = document.getElementById('btnBack');

        // Пауза должна совпадать с переменной --pause в CSS
        const pauseAmount = 150; 

        lenis.on('scroll', (e) => {
            if (menu.classList.contains('is-expanded')) return;

            // Теперь триггер срабатывает не сразу после Hero, а с задержкой
            const threshold = hero.offsetHeight + pauseAmount;

            if (e.scroll >= threshold) {
                menu.dataset.mode = 'fab';
                menu.classList.add('is-fab');
            } else {
                menu.dataset.mode = 'full';
                menu.classList.remove('is-fab');
            }
        });

        menu.addEventListener('click', (e) => {
            if (menu.classList.contains('is-fab')) {
                menu.classList.remove('is-fab');
                menu.classList.add('is-expanded');
                lenis.stop();
            }
        });

        btnBack.addEventListener('click', (e) => {
            e.stopPropagation();
            menu.classList.remove('is-expanded');
            lenis.start();
            
            if (menu.dataset.mode === 'fab') {
                menu.classList.add('is-fab');
            }
        });
    </script>
</body>
</html>
