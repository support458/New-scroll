<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Science Action - Perfect Pause</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
</head>

<body>

    <header class="hero" id="hero">
        <h1>The Future of Science</h1>
        <p>Scroll down to enter</p>
    </header>

    <div class="overlap-wrapper">
        <main class="page-content" id="mainContent">
            <h2 style="font-size: 1.8rem; font-weight: 900; margin-bottom: 1.5rem;">Tell us what you want to</h2>
            <div class="card">
                <div class="label">I want to</div>
                <div class="value">be heard</div>
            </div>
            <div class="card">
                <div class="label">Choose the topic</div>
                <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;">
                    <span
                        style="background: white; padding: 12px 18px; border-radius: 20px; font-size: 0.85rem; border: 1px solid #ddd; font-weight: 600;">data
                        ethics</span>
                    <span
                        style="background: white; padding: 12px 18px; border-radius: 20px; font-size: 0.85rem; border: 1px solid #ddd; font-weight: 600;">climate
                        policy</span>
                </div>
            </div>
            <h2 style="font-size: 1.8rem; font-weight: 900; margin-top: 3rem;">Latest Insights</h2>
            <div style="width:100%; height:250px; background:#f4f4f4; border-radius:25px; margin-top: 15px;"></div>
            <div style="width:100%; height:250px; background:#f4f4f4; border-radius:25px; margin-top: 15px;"></div>
        </main>

        <div class="menu-layer">
            <nav id="menu" class="menu">
                <button class="fab-icon" aria-label="Open menu">☰</button>
                <div class="menu-inner">
                    <div>
                        <div style="font-weight: 700; opacity: 0.8; font-size: 0.75rem;">science action</div>
                        <div class="menu-title">Science for people who give a shit</div>
                        <div style="margin-top: 1rem;">
                            <span class="pill">explore</span>
                            <span class="pill active">action tool</span>
                            <span class="pill">profile</span>
                        </div>
                    </div>
                    <button class="close-btn" id="btnBack" aria-label="Close menu">←</button>
                </div>
            </nav>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
